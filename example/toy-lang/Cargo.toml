[package]
name = "toy-lang"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "toy-lang"
path = "src/main.rs"

[dependencies]
kirin = { workspace = true }
kirin-arith = { workspace = true }
kirin-bitwise = { workspace = true }
kirin-cf = { workspace = true }
kirin-cmp = { workspace = true }
kirin-constant = { workspace = true }
kirin-constprop = { workspace = true }
kirin-function = { workspace = true }
kirin-scf = { workspace = true, features = ["constprop"] }
kirin-interpreter = { workspace = true, features = ["derive"] }
kirin-chumsky = { workspace = true }
kirin-prettyless = { workspace = true }
clap = { workspace = true }
anyhow = { workspace = true }
smallvec = { workspace = true }
rustc-hash = "2.1.2"

[dev-dependencies]
assert_cmd = { workspace = true }
predicates = { workspace = true }
