[package]
name = "kirin-test-languages"
version = "0.1.0"
edition = "2024"

[dependencies]
kirin-ir = { version = "0.1.0", path = "../kirin-ir", default-features = false }
kirin-test-types = { workspace = true, features = ["parser", "pretty"] }
kirin-chumsky = { workspace = true, optional = true }
kirin-lexer = { workspace = true, optional = true }
kirin-prettyless = { workspace = true, optional = true }
kirin-arith = { workspace = true, optional = true, features = ["interpret"] }
kirin-bitwise = { workspace = true, optional = true }
kirin-cf = { workspace = true, optional = true, features = ["interpret"] }
kirin-constant = { workspace = true, optional = true, features = ["interpret"] }
kirin-function = { workspace = true, optional = true, features = ["interpret"] }
kirin-derive-ir = { workspace = true, optional = true }
kirin-derive-interpreter = { workspace = true, optional = true }
kirin-derive-chumsky = { workspace = true, optional = true }
kirin-interpreter = { workspace = true, optional = true }

[features]
default = []
simple-language = ["kirin-ir/derive"]
composite-language = ["kirin-ir/derive", "kirin-arith", "kirin-cf", "kirin-constant", "kirin-function", "kirin-derive-ir", "kirin-derive-interpreter", "kirin-derive-chumsky", "kirin-interpreter"]
arith-function-language = ["kirin-ir/derive", "kirin-arith", "kirin-cf", "kirin-function", "parser", "pretty"]
bitwise-function-language = ["kirin-ir/derive", "kirin-arith", "kirin-bitwise", "kirin-cf", "kirin-function", "parser", "pretty"]
callable-language = ["kirin-ir/derive", "kirin-arith", "kirin-function", "parser", "pretty"]
namespaced-language = ["kirin-ir/derive", "kirin-arith", "kirin-cf", "kirin-function", "parser", "pretty"]
ungraph-language = ["kirin-ir/derive"]
parser = ["kirin-chumsky/derive", "kirin-lexer"]
pretty = ["kirin-prettyless", "kirin-derive-chumsky"]
